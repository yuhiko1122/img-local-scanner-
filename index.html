<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像 位置情報スキャナー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <h1>📍 画像 位置情報スキャナー</h1>
    <p class="subtitle">JPEGをアップロードしてExif GPSデータを取得します</p>

    <!-- ドロップゾーン -->
    <label id="dropzone">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
      </svg>
      <span class="drop-label">クリックまたはドラッグ＆ドロップ</span>
      <span class="drop-hint">JPEG / JPG</span>
      <input id="fileInput" type="file" accept="image/jpeg" style="display:none" />
    </label>

    <!-- 画像プレビュー -->
    <div id="previewWrapper" class="hidden">
      <p class="section-label">プレビュー</p>
      <img id="preview" alt="preview" />
    </div>

    <!-- 結果 -->
    <div id="resultWrapper" class="hidden">
      <p class="section-label">Exif 位置情報</p>

      <div id="resultSuccess" class="result-box success hidden">
        <div class="result-title">
          <span>✅</span>
          <span>位置情報が見つかりました</span>
        </div>
        <div class="address-card">
          <p class="coord-label">住所 (Address)</p>
          <p id="addressValue">取得中...</p>
        </div>
      </div>

      <div id="resultEmpty" class="result-box empty hidden">
        <span>⚠️</span>
        <span>位置情報が見つかりません</span>
      </div>

      <div id="resultError" class="result-box error hidden">
        <span>❌</span>
        <span id="errorMessage"></span>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>
  <script src="main.js"></script>
</body>
</html>
